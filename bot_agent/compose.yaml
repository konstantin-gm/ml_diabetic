services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: diabet
      POSTGRES_USER: diabet
      POSTGRES_PASSWORD: diabet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diabet -d diabet"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    env_file: ${ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql+asyncpg://diabet:diabet@db:5432/diabet
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
